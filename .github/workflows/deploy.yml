name: Deploy Typst PDFs to Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fondamentale per permettere il calcolo dei file modificati

      # --- AGGIORNATO AL REPOSITORY UFFICIALE DELLA COMMUNITY ---
      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          version: ^0.14.0

      # 1. Rileva i file Typst modificati o aggiunti
      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.typ
            !site/**
            !dist/**

      # 2. Ripristina i PDF compilati nei deploy precedenti (evita di perderli)
      - name: Cache Compiled PDFs
        uses: actions/cache@v4
        with:
          path: dist/pdf
          key: ${{ runner.os }}-typst-pdfs-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-typst-pdfs-

      # 3. Organizza la cartella 'dist' e compila SOLO i modificati
      - name: Compile and Organize PDFs
        run: |
          # Crea le cartelle necessarie per il deploy
          mkdir -p dist/pdf

          # Copia il contenuto di 'site/' (HTML, immagini, ecc.) dentro 'dist'
          if [ -d "site" ]; then
            cp -r site/* dist/
            echo "✅ Risorse del sito (HTML e Assets) copiate con successo in dist/"
          else
            echo "⚠️ ATTENZIONE: La cartella 'site/' non è stata trovata nella radice!"
          fi

          # Se non ci sono file Typst modificati, saltiamo la compilazione
          if [ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]; then
            echo "✨ Nessun file Typst modificato. Salto la compilazione."
          else
            echo "🔍 File modificati rilevati: ${{ steps.changed-files.outputs.all_changed_files }}"
            
            # Array associativo per evitare doppie compilazioni nello stesso push
            declare -A compilati
            
            for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
              materia=""
              
              # CASO 1: Modifica dentro template/matematica/...
              if [[ "$file" == template/* ]]; then
                materia=$(echo "$file" | cut -d'/' -f2)
              
              # CASO 2: Modifica dentro docs/matematica/...
              elif [[ "$file" == docs/* ]]; then
                materia=$(echo "$file" | cut -d'/' -f2)
              fi
              
              # Se abbiamo isolato il nome della materia e non l'abbiamo ancora elaborata in questo run
              if [ -n "$materia" ] && [ -z "${compilati[$materia]}" ]; then
                
                # Il target punta sempre alla cartella della materia dentro template
                main_file="template/${materia}/main.typ"
                
                if [ -f "$main_file" ]; then
                  echo "------------------------------------------------"
                  echo "📄 Modifica rilevata per la materia: $materia"
                  
                  target_pdf="dist/pdf/${materia}.pdf"
                  echo "🚀 Compilazione incrementale in corso: $main_file -> $target_pdf"
                  
                  typst compile --root . --font-path ./fonts "$main_file" "$target_pdf" || { echo "❌ Errore critico in Typst per $main_file"; exit 1; }
                  
                  # Segna la materia come completata per saltare eventuali altri file correlati nello stesso commit
                  compilati[$materia]=1
                else
                  echo "ℹ️ Trovata modifica in '$file' (materia: $materia), ma non esiste il file principale '$main_file'. Salto."
                fi
              fi
            done
          fi
          
          echo "------------------------------------------------"
          echo "Contenuto finale della cartella dist (pronta per il web):"
          ls -R dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4