name: Deploy Typst PDFs to Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- AGGIORNATO AL REPOSITORY UFFICIALE DELLA COMMUNITY ---
      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          version: ^0.14.0

      - name: Compile and Organize PDFs
        run: |
          # 1. Crea la struttura finale dentro la cartella di deploy 'dist'
          mkdir -p dist/pdf

          # 2. Copia la homepage HTML nella radice del sito finale
          cp docs/index.html dist/ 2>/dev/null || true
          
          # 3. Cerca tutti i file che si chiamano esattamente 'main.typ'
          find . -type f -iname "main.typ" | while read -r file; do
            echo "------------------------------------------------"
            echo "📄 Trovato sorgente: $file"
            
            # Estrae il nome della cartella superiore (es. chimica)
            folder_name=$(basename "$(dirname "$file")")
            
            # Evita che prenda cartelle di sistema o la radice se il file fosse fuori posto
            if [ "$folder_name" = "docs" ] || [ "$folder_name" = "." ] || [ "$folder_name" = "template" ]; then
              folder_name="generale"
            fi
            
            target_pdf="dist/pdf/${folder_name}.pdf"
            echo "🚀 Compilazione in corso con Font personalizzati: $file -> $target_pdf"            
            
            typst compile --root . --font-path ./fonts "$file" "$target_pdf" || { echo "❌ Errore critico in Typst per $file"; exit 1; }
          done
          
          echo "------------------------------------------------"
          echo "Contenuto finale della cartella dist/pdf:"
          ls -la dist/pdf/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4