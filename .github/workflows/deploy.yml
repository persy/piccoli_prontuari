name: Deploy Typst PDFs to Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # --- AGGIORNATO AL REPOSITORY UFFICIALE DELLA COMMUNITY ---
      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          version: ^0.14.0

      - name: Compile and Organize PDFs
        run: |
          # 1. Crea la struttura finale dentro la cartella di deploy 'dist'
          mkdir -p dist/pdf

          # 2. Copia la homepage HTML nella radice del sito finale
          cp docs/index.html dist/ 2>/dev/null || true
          
          # 3. Cerca tutti i file che si chiamano esattamente 'main.typ'
          find docs -name "main.typ" | while read -r file; do
            
            # Estrae il nome della cartella superiore (es. biologia)
            folder_name=$(basename "$(dirname "$file")")
            
            # Definisce il percorso finale (es. dist/pdf/biologia.pdf)
            target_pdf="dist/pdf/${folder_name}.pdf"
            
            echo "Compilazione in corso: $file -> $target_pdf"
            
            # Compila il file Typst direttamente nel PDF finale rinominandolo con il nome della cartella
            typst compile --root . "$file" "$target_pdf"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5